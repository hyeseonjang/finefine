<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f0df" />
    <title>2048</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="game-title">
      <section class="topbar">
        <div>
          <h1 id="game-title">2048</h1>
          <p class="subtitle">4x4 보드에서 2048 타일을 만들어보세요.</p>
        </div>
        <div class="scores" aria-label="점수판">
          <div class="score-box">
            <span>점수</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>최고</span>
            <strong id="best-score">0</strong>
          </div>
        </div>
      </section>

      <section class="actions">
        <button id="new-game" type="button">새 게임</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="board-wrap" aria-label="2048 게임 보드">
        <div id="board" class="board"></div>
        <div id="message" class="message" hidden>
          <strong id="message-title"></strong>
          <span id="message-copy"></span>
          <button id="keep-playing" type="button">계속하기</button>
        </div>
      </section>

      <section class="mobile-controls" aria-label="모바일 방향키">
        <button type="button" data-dir="up" aria-label="위로 이동">↑</button>
        <button type="button" data-dir="left" aria-label="왼쪽으로 이동">←</button>
        <button type="button" data-dir="right" aria-label="오른쪽으로 이동">→</button>
        <button type="button" data-dir="down" aria-label="아래로 이동">↓</button>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
